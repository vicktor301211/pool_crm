<!DOCTYPE html>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки - АкваСпорт</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="header">
    <div class="logo">🏊‍♂️ АкваСпорт - Запись в бассейн</div>
    <a href="/" class="home-link">🏠 На главную</a>
</header>

<main class="main">
    <div class="form-container">
        <h1>📝 Запись на занятия плаванием</h1>
        <p class="form-subtitle">Заполните форму, и наш тренер свяжется с вами</p>

        <form id="applicationForm" method="POST" action="/api/application/submit">
            <div class="form-section">
                <h3>Данные родителя</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>ФИО родителя *</label>
                        <input type="text" name="parent_full_name" required>
                    </div>
                    <div class="form-group">
                        <label>Телефон *</label>
                        <input type="tel" name="parent_phone" required placeholder="+7XXXXXXXXXX">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="parent_email" placeholder="example@mail.ru">
                    </div>
                    <div class="form-group">
                        <label>VK ID (по желанию)</label>
                        <input type="text" name="vk_id" placeholder="id123456789">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Данные ребенка</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>ФИО ребенка *</label>
                        <input type="text" name="child_full_name" required>
                    </div>
                    <div class="form-group">
                        <label>Возраст *</label>
                        <input type="number" name="child_age" min="3" max="17" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Школа</label>
                        <input type="text" name="school_name" placeholder="Название школы">
                    </div>
                    <div class="form-group">
                        <label>Класс</label>
                        <input type="number" name="child_class" min="0" max="11">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Год обучения плаванию</label>
                        <select name="swimming_years">
                            <option value="1">1-й год</option>
                            <option value="2">2-й год</option>
                            <option value="3">3-й год и более</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Предпочитаемая смена</label>
                        <select name="shift" required>
                            <option value="day">Дневная</option>
                            <option value="evening">Вечерняя</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Желаемое количество занятий в неделю</label>
                        <select name="desired_lessons_per_week" required>
                            <option value="1">1 раз в неделю</option>
                            <option value="2">2 раза в неделю</option>
                            <option value="3">3 раза в неделю</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">📤 Отправить заявку</button>
        </form>
    </div>
</main>

<script>
document.getElementById('applicationForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);

    const response = await fetch('/api/application/submit', {
        method: 'POST',
        body: formData
    });

    const result = await response.json();
    if (result.success) {
        alert('Заявка успешно отправлена! Мы свяжемся с вами в ближайшее время.');
        window.location.href = '/';
    } else {
        alert('Ошибка: ' + result.error);
    }
};
</script>

</body>
</html>
