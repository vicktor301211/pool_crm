<!-- access_denied.html (обновлённый с наследованием от base.html) -->
{% extends "base.html" %}

{% block title %}Доступ запрещён - Swim CRM{% endblock %}

{% block content %}
<div class="access-denied-container">
    <div class="access-denied-card">
        <div class="access-denied-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h1>Доступ запрещён</h1>
        <p>{{ message if message else "У вас нет прав для просмотра этой страницы." }}</p>
        <div class="form-actions" style="justify-content: center; margin-top: 30px;">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> На главную
            </a>
            <a href="/dashboard" class="btn btn-secondary">
                <i class="fas fa-tachometer-alt"></i> В личный кабинет
            </a>
            <a href="/logout" class="btn btn-outline">
                <i class="fas fa-sign-out-alt"></i> Выйти
            </a>
        </div>
    </div>
</div>
{% endblock %}
